# macOS-only: force rustc to use Apple's real `/usr/bin/cc` as the linker
# driver. Nix's wrapped clang (used in the devenv shell) ignores `SDKROOT`,
# so link-time `-syslibroot` doesn't get set to the real Xcode SDK and core
# libc symbols (`_write`, `_sysconf`, `_waitpid`, ...) referenced from
# `libstd` go unresolved against the Nix stub SDK. Apple's cc honors
# SDKROOT and links libSystem from the right SDK.
#
# Non-devenv contributors on macOS aren't affected by this — `/usr/bin/cc`
# is already what their cargo would pick.
[target.'cfg(target_os = "macos")']
linker = "/usr/bin/cc"

# Dev ergonomics: launch the desktop build from inside a throwaway
# `OpenLogi.app` so macOS shows the real app name + Dock icon during
# development (both are read from a bundle's Info.plist / Resources, which a
# bare `cargo run` binary lacks). The runner is a transparent passthrough for
# the CLI, tests, and every other binary — only `openlogi-gui` is wrapped.
# A path with a separator is resolved relative to this config file's directory,
# so it works from any cwd. See scripts/cargo-run-macos.sh.
runner = "scripts/cargo-run-macos.sh"

# Belt-and-suspenders DEVELOPER_DIR for contributors who run cargo outside
# the devenv shell and have xcode-select pointing at the Command Line Tools
# only (no Metal toolchain). `force = false` means a real DEVELOPER_DIR
# already exported in the shell (devenv users, CI runners) wins.
[env]
DEVELOPER_DIR = { value = "/Applications/Xcode.app/Contents/Developer", force = false }
