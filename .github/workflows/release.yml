name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  dmg:
    name: macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      OPENLOGI_BUNDLE_ASSETS: ${{ vars.OPENLOGI_BUNDLE_ASSETS }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Load release secrets from 1Password
        id: load_secrets
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_SIGNING_IDENTITY
          APPLE_CERTIFICATE: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_CERTIFICATE
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_CERTIFICATE_PASSWORD
          APPLE_ID: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_ID
          APPLE_PASSWORD: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_PASSWORD
          APPLE_TEAM_ID: ${{ secrets.OP_APPLE_SECRET_ITEM }}/APPLE_TEAM_ID

      - name: Install packaging tools
        run: |
          brew install librsvg
          brew install create-dmg
          cargo install cargo-bundle --locked

      - name: Validate release secrets
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?Configure APPLE_SIGNING_IDENTITY in GitHub Secrets}"
          : "${APPLE_CERTIFICATE:?Configure APPLE_CERTIFICATE in GitHub Secrets}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Configure APPLE_CERTIFICATE_PASSWORD in GitHub Secrets}"
          : "${APPLE_ID:?Configure APPLE_ID in GitHub Secrets}"
          : "${APPLE_PASSWORD:?Configure APPLE_PASSWORD in GitHub Secrets}"
          : "${APPLE_TEAM_ID:?Configure APPLE_TEAM_ID in GitHub Secrets}"

      - name: Import Apple signing certificate
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/openlogi-signing.keychain-db"
          cert_path="$RUNNER_TEMP/openlogi-signing.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path"

          security create-keychain -p "$RUNNER_TEMP" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$RUNNER_TEMP" "$keychain"
          security import "$cert_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$RUNNER_TEMP" \
            "$keychain"
          security list-keychains -d user -s \
            "$keychain" \
            $(security list-keychains -d user | sed 's/[" ]//g')
          security find-identity -v -p codesigning "$keychain"

      - name: Build OpenLogi.app with cargo-bundle
        run: |
          set -euo pipefail
          export SDKROOT="$(/usr/bin/xcrun --sdk macosx --show-sdk-path)"

          bash scripts/macos-icns.sh
          if [ "${OPENLOGI_BUNDLE_ASSETS:-0}" = "1" ]; then
            cargo run -p openlogi-cli --release -- assets sync
          else
            rm -rf crates/openlogi-gui/assets
            mkdir -p crates/openlogi-gui/assets
          fi

          cd crates/openlogi-gui
          cargo bundle --release

      - name: Sign app bundle
        run: |
          set -euo pipefail
          app="target/release/bundle/osx/OpenLogi.app"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Create and sign DMG
        run: |
          set -euo pipefail
          app="target/release/bundle/osx/OpenLogi.app"
          dmg="target/release/OpenLogi.dmg"
          rm -f "$dmg"
          create-dmg \
            --volname "OpenLogi" \
            --window-size 640 420 \
            --icon "OpenLogi.app" 180 170 \
            --app-drop-link 460 170 \
            --hide-extension "OpenLogi.app" \
            "$dmg" \
            "$app"
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$dmg"
          codesign --verify --verbose=2 "$dmg"

      - name: Notarize DMG
        uses: lando/notarize-action@v2
        with:
          product-path: target/release/OpenLogi.dmg
          appstore-connect-username: ${{ steps.load_secrets.outputs.APPLE_ID }}
          appstore-connect-password: ${{ steps.load_secrets.outputs.APPLE_PASSWORD }}
          appstore-connect-team-id: ${{ steps.load_secrets.outputs.APPLE_TEAM_ID }}
          primary-bundle-id: org.openlogi.OpenLogi
          tool: notarytool
          verbose: true

      - name: Staple DMG
        uses: BoundfoxStudios/action-xcode-staple@v1
        with:
          product-path: target/release/OpenLogi.dmg

      - name: Collect DMG artifact
        run: |
          mkdir -p dist
          ref_name="${GITHUB_REF_NAME:-dev}"
          ref_name="${ref_name//\//-}"
          cp target/release/OpenLogi.dmg "dist/OpenLogi-${ref_name}-macos.dmg"
          shasum -a 256 dist/*.dmg > dist/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: OpenLogi-macos-dmg
          path: |
            dist/*.dmg
            dist/SHA256SUMS

      - name: Attach DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/SHA256SUMS
